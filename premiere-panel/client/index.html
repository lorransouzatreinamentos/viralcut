<!doctype html>
<html lang="pt-BR">
<head>
<meta charset="utf-8">
<title>VIRALCUT</title>
<!-- CSInterface: shim mínimo (reaproveitado do FastVideo, funciona nesta máquina). -->
<script src="./CSInterface.js"></script>
<style>
  :root { --bg:#16181d; --panel:#1e2128; --line:#2c3038; --txt:#e6e8ec; --dim:#9aa0ac; --accent:#4f8cff; --ok:#3fb950; --warn:#d29922; }
  * { box-sizing:border-box; }
  body { margin:0; font:14px/1.5 -apple-system,Segoe UI,Roboto,sans-serif; background:var(--bg); color:var(--txt); }
  header { padding:14px 16px; border-bottom:1px solid var(--line); display:flex; align-items:center; gap:10px; }
  header b { font-size:15px; letter-spacing:.5px; }
  #host { font-size:12px; color:var(--dim); margin-left:auto; }
  main { padding:16px; max-width:560px; margin:0 auto; }
  .step { background:var(--panel); border:1px solid var(--line); border-radius:10px; padding:14px; margin-bottom:12px; }
  .step h2 { margin:0 0 4px; font-size:13px; text-transform:uppercase; letter-spacing:.6px; color:var(--dim); }
  button { background:var(--accent); color:#fff; border:0; border-radius:8px; padding:10px 14px; font-size:14px; cursor:pointer; width:100%; }
  button.secondary { background:transparent; border:1px solid var(--line); color:var(--txt); }
  button:disabled { opacity:.45; cursor:not-allowed; }
  .row { display:flex; gap:8px; }
  .card { border:1px solid var(--line); border-radius:8px; padding:10px; margin:8px 0; display:flex; gap:10px; align-items:flex-start; }
  .card input { margin-top:3px; }
  .score { font-weight:700; padding:2px 8px; border-radius:20px; font-size:12px; background:#243; color:var(--ok); white-space:nowrap; }
  .title { font-weight:600; }
  .meta { color:var(--dim); font-size:12px; }
  .hook { color:var(--dim); font-size:12px; font-style:italic; margin-top:2px; }
  .msg { font-size:13px; padding:8px 10px; border-radius:6px; margin-top:8px; }
  .msg.err { background:#3a2020; color:#ff9b9b; }
  .msg.ok { background:#1e3324; color:#8fe0a0; }
  .bar { height:6px; background:var(--line); border-radius:6px; overflow:hidden; }
  .bar > i { display:block; height:100%; background:var(--accent); width:0; transition:width .3s; }
  .dim { color:var(--dim); font-size:12px; }
  #title { cursor:pointer; }
  #title:hover { color:var(--accent); }
  #ver { position:fixed; bottom:4px; right:8px; font-size:9px; color:#555; letter-spacing:.3px; user-select:none; }
  .objs { display:flex; gap:6px; }
  .objs button { flex:1; padding:9px 4px; font-size:12px; line-height:1.2; }
  button.active { background:var(--accent); color:#fff; border-color:var(--accent); }
  .opts { background:#191c22; border:1px solid var(--line); border-radius:8px; padding:10px; margin-top:8px; }
  .opt { display:flex; align-items:center; justify-content:space-between; gap:8px; margin:6px 0; }
  .opt label { font-size:12px; color:var(--dim); }
  .opt input { width:74px; background:#12151a; border:1px solid var(--line); color:var(--txt);
               border-radius:6px; padding:5px 7px; font-size:13px; text-align:right; }
  .opt input:focus { outline:none; border-color:var(--accent); }
  .swatch { display:inline-block; width:9px; height:9px; border-radius:2px; margin-right:5px; vertical-align:middle; }
</style>
</head>
<body>
<header>
  <b id="title" title="Clique para atualizar o app">✂ VIRALCUT</b>
  <span id="host">detectando…</span>
</header>
<main>
  <div class="step">
    <h2>1 · Sequência</h2>
    <div id="tlInfo" class="dim">Nenhuma sequência selecionada.</div>
    <div style="height:8px"></div>
    <button id="btnSelect">Selecionar sequência ativa</button>
  </div>

  <div class="step">
    <h2>2 · Analisar (transcrever)</h2>
    <button id="btnAnalyze" disabled>Analisar vídeo da timeline</button>
    <div id="progressWrap" style="display:none; margin-top:10px;">
      <div class="bar"><i id="progressBar"></i></div>
      <div id="progressTxt" class="dim" style="margin-top:4px;"></div>
    </div>
  </div>

  <div class="step" id="objStep" style="display:none;">
    <h2>3 · Objetivo</h2>
    <div id="analyzeDone" class="dim" style="margin-bottom:8px;"></div>
    <div class="objs">
      <button class="secondary" id="btnObjViral">Falas virais</button>
      <button class="secondary" id="btnObjFrank">Montar falas</button>
      <button class="secondary" id="btnObjSilence">Remover silêncios</button>
    </div>
    <div id="opts" class="opts" style="display:none;"></div>
    <div id="results" style="margin-top:8px;"></div>
    <button id="btnApply" style="margin-top:8px; display:none;">Aplicar</button>
    <div id="applyMsg"></div>
  </div>
</main>
<div id="ver"></div>

<script src="./version.js"></script>
<script>
  window.__csi = new CSInterface();
  // Carrega o host ExtendScript EXPLICITAMENTE (não depende só do ScriptPath do
  // manifesto, que exigiria reiniciar o Premiere). No macOS o evalScript é
  // síncrono, então o bundle carrega antes do app.js rodar. Folder.userData.fsName
  // resolve para ~/Library/Application Support (caminho nativo, com o espaço).
  window.__csi.evalScript(
    '$.evalFile(Folder.userData.fsName + "/Adobe/CEP/extensions/VIRALCUT/host/bundle.jsx")'
  );
</script>
<script src="./core-cep.js"></script>
<script src="./app.js"></script>
</body>
</html>
